<section class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 h-screen bg-base-100 overflow-hidden">

  <aside class="col-span-1 bg-base-200 border-r border-base-300 flex flex-col h-full shadow-inner">

    <div class="p-6 pb-2">
      <a routerLink="/welcome" class="group flex items-center gap-2 transition-all">
        <span
          class="text-4xl font-monserratAlternate font-black tracking-tighter text-base-content"
          style="view-transition-name: exectivid"
        >
          Exectivid
        </span>
      </a>
    </div>

    <nav class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
      <div class="px-2 pb-2">
        <span class="text-[10px] font-bold uppercase tracking-widest text-base-content/50">Álbumes</span>
      </div>

      @for (album of albumes(); track album.id) {
        <a
          [routerLink]="['album', album.slug]"
          routerLinkActive="bg-base/10 text-base-content border-r-4 border-base"
          class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-base-300 transition-all duration-200 text-sm font-medium group"
        >
          <span class="truncate font-monserratAlternate">{{ album.id }} • {{ album.name }}</span>
        </a>
      }
    </nav>

    <div class="p-6 border-t border-base-300 bg-base-200/50">
      <div class="space-y-4">

        <div>
          <p class="text-[10px] font-bold uppercase tracking-widest text-base-content/40 mb-1">
            Créditos
          </p>
          <p class="text-sm font-monserratAlternate text-base-content/80 leading-tight">
            <span class="font-bold">Lewy</span>
            <span class="text-[10px] mx-1 opacity-50 italic">para</span>
            <span class="font-bold">Pietro Benavente</span>
          </p>
        </div>

        <div class="space-y-2 mt-4 pt-4 border-t border-base-content/5">
          <p class="text-[10px] font-bold uppercase tracking-widest text-base-content/40">
            Sigue a Exectivid
          </p>

              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 20 20"
              >

              <svg

            </a>
          </div>
        </div>

        <p class="text-[9px] text-base-content/30 italic mt-2">© 2026 Huancayo, Perú</p>
      </div>
    </div>

  </aside>

  <main class="col-span-1 md:col-span-3 lg:col-span-4 h-full overflow-y-auto bg-base-100">
    <div class="p-6 md:p-10 max-w-7xl mx-auto">
      <router-outlet />
    </div>
  </main>

</section>
