<div class="mt-8">

  <div class="flex flex-col md:flex-row items-center md:items-end gap-6 mb-8 border-b border-base-300 pb-8">

    <div class="shrink-0">
      <img
        [src]="albumInfo()?.image"
        alt="Portada del álbum"
        class="w-48 h-48 md:w-56 md:h-56 object-cover rounded-2xl shadow-xl border border-base-200 bg-base-300"
        style="view-transition-name: cover"
      />
    </div>

    <div class="text-center md:text-left flex-1">

      <p class="text-xs font-monserratAlternate md:text-sm font-bold uppercase tracking-widest mb-1 md:mb-2">
        {{ albumInfo()?.type }} • {{ albumInfo()?.year }}
      </p>

      <h1 class="text-3xl font-monserratAlternate md:text-5xl lg:text-6xl font-extrabold text-base-content tracking-tight mb-2 md:mb-4">
        {{ albumInfo()?.name }}
      </h1>

      <h2 class="text-lg font-monserratAlternate md:text-xl font-semibold text-base-content/60">
        Lista de canciones
      </h2>

    </div>

  </div>

  <ul class="flex flex-col gap-3">
    @for ( song of songInfo(); track song.id ) {
      <li class="flex items-center p-4 bg-base-100 border border-base-300 rounded-xl shadow-sm hover:shadow-md hover:border-base transition-all duration-300 group">
        <a
          [routerLink]="[song.slug]"
        >
          <span class="text-lg font-medium text-base-content group-hover:text-base transition-colors">
            {{ song.id }} • {{ song.name }}
          </span>
        </a>
      </li>
    }
  </ul>
</div>
