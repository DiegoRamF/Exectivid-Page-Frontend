<div class="mt-12 mb-20 px-4 md:px-0">

  @if (!songInfo()?.lyrics) {
    <div class="flex flex-col items-center justify-center py-24 gap-4">
      <span class="loading loading-bars loading-lg text-base"></span>
      <p class="text-base-content/60 font-medium animate-pulse">
        Buscando la letra...
      </p>
    </div>
  }

  @else {
    <div class="max-w-3xl mx-auto bg-base-200/50 p-6 md:p-10 rounded-3xl shadow-lg border border-base-300">

      <div class="flex flex-col md:flex-row items-center gap-8 mb-10 pb-8 border-b border-base-300/50">

        <div class="shrink-0">
          <img
            [src]="albumResource.value()?.image"
            alt="Portada del álbum"
            class="w-40 h-40 md:w-48 md:h-48 object-cover rounded-2xl shadow-2xl border-4 border-white/10"
            style="view-transition-name: cover"
          />
        </div>

        <div class="text-center md:text-left">
          <h2 class="text-3xl md:text-4xl font-black text-base-content tracking-tight">
            {{ songInfo()?.name }}
          </h2>
          <p class="text-base-content/50 font-medium mt-2 uppercase tracking-widest text-sm">
            {{ albumResource.value()?.name }}
          </p>
        </div>

      </div>

      <div class="text-lg md:text-xl text-base-content/80 text-center font-medium leading-relaxed">
        @for (line of songInfo()?.lyrics; track $index) {
          @if (line.trim() === '') {
            <div class="h-8"></div>
          }
          @else {
            <p class="hover:text-base transition-colors duration-200 cursor-default">{{ line }}</p>
          }
        }
      </div>

    </div>
  }

</div>
