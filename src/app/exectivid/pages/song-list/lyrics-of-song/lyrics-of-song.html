<div class="mt-12 mb-20 px-4 md:px-0">

  @if (!songInfo()?.lyrics) {
    <div class="flex flex-col items-center justify-center py-24 gap-4">
      <span class="loading loading-bars loading-lg text-primary"></span>
      <p class="text-base-content/60 font-medium animate-pulse">
        Buscando la letra...
      </p>
    </div>
  }

  @else {
    <div class="max-w-2xl mx-auto bg-base-100 p-8 md:p-12 rounded-3xl shadow-sm border border-base-300">

      <h3 class="text-sm font-bold uppercase tracking-widest text-center mb-8 border-b border-base-200 pb-4">
        {{ songInfo()?.name }}
      </h3>

      <div class="text-lg md:text-xl text-base-content/80 text-center font-medium">
        @for (line of songInfo()?.lyrics; track $index) {

          @if (line.trim() === '') {
            <div class="h-6"></div>
          }
          @else {
            <p class="mb-1">{{ line }}</p>
          }

        }
      </div>

    </div>
  }

</div>
